<body class="bg-background font-body-lg text-on-background min-h-screen flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop">

<!-- Username Field -->

<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">person</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-surface-variant bg-white focus:ring-1 focus:ring-primary-container focus:border-primary-container outline-none transition-all font-body-sm text-on-surface placeholder:text-outline-variant" id="username" name="username" placeholder="administrator@tongek.com" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-surface-variant bg-white focus:ring-1 focus:ring-primary-container focus:border-primary-container outline-none transition-all font-body-sm text-on-surface placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" type="password"/>

<!-- Script for micro-interactions -->
<script>
        // Simple ripple effect for the gold button
        const button = document.querySelector('button[type="submit"]');
        button.addEventListener('click', function(e) {
            let ripple = document.createElement('span');
            ripple.classList.add('ripple');
            this.appendChild(ripple);
            let x = e.clientX - e.target.offsetLeft;
            let y = e.clientY - e.target.offsetTop;
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            setTimeout(() => {
                ripple.remove();
            }, 600);
        });

        // Toggle password visibility placeholder (UI logic only)
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
<style>
        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 50%;
            animation: ripple-animation 0.6s linear;
        }
        @keyframes ripple-animation {
            from {
                width: 0px;
                height: 0px;
                opacity: 0.5;
            }
            to {
                width: 500px;
                height: 500px;
                opacity: 0;
            }
        }
    </style>
